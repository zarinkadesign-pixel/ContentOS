<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Аренда Астана</title>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<style>
  :root {
    --bg: var(--tg-theme-bg-color, #fff);
    --text: var(--tg-theme-text-color, #1a1a1a);
    --hint: var(--tg-theme-hint-color, #888);
    --link: var(--tg-theme-link-color, #3390ec);
    --btn: var(--tg-theme-button-color, #3390ec);
    --btn-text: var(--tg-theme-button-text-color, #fff);
    --secondary-bg: var(--tg-theme-secondary-bg-color, #f4f4f5);
    --accent: #1A3A5C;
    --green: #27AE60;
    --r: 12px;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); font-size: 14px; line-height: 1.5; overscroll-behavior: none; }

  /* Header */
  .header { position: sticky; top: 0; z-index: 100; background: var(--bg); border-bottom: 1px solid rgba(0,0,0,.08); padding: 10px 12px 8px; }
  .header-title { font-size: 16px; font-weight: 700; color: var(--accent); margin-bottom: 8px; }
  .search-row { display: flex; gap: 8px; }
  .search-input { flex: 1; height: 36px; border: 1.5px solid rgba(0,0,0,.1); border-radius: 10px; padding: 0 12px; font-size: 14px; background: var(--secondary-bg); color: var(--text); outline: none; }
  .search-input:focus { border-color: var(--btn); }
  .filter-btn { width: 36px; height: 36px; border: 1.5px solid rgba(0,0,0,.1); border-radius: 10px; background: var(--secondary-bg); display: flex; align-items: center; justify-content: center; cursor: pointer; font-size: 18px; }
  .filter-btn.active { background: var(--btn); border-color: var(--btn); }

  /* Filters panel */
  .filters { background: var(--secondary-bg); padding: 10px 12px; overflow: hidden; max-height: 0; transition: max-height .25s ease; }
  .filters.open { max-height: 300px; }
  .filter-label { font-size: 11px; color: var(--hint); font-weight: 600; text-transform: uppercase; letter-spacing: .05em; margin: 6px 0 4px; }
  .chips { display: flex; flex-wrap: wrap; gap: 6px; }
  .chip { padding: 5px 12px; border-radius: 20px; border: 1.5px solid rgba(0,0,0,.12); font-size: 13px; cursor: pointer; background: var(--bg); color: var(--text); transition: all .15s; white-space: nowrap; }
  .chip.sel { background: var(--btn); color: var(--btn-text); border-color: var(--btn); }
  .price-row { display: flex; gap: 8px; margin-top: 6px; }
  .price-input { flex: 1; height: 34px; border: 1.5px solid rgba(0,0,0,.1); border-radius: 8px; padding: 0 10px; font-size: 13px; background: var(--bg); color: var(--text); outline: none; }

  /* Sort bar */
  .sort-bar { display: flex; gap: 6px; padding: 8px 12px; overflow-x: auto; scrollbar-width: none; }
  .sort-bar::-webkit-scrollbar { display: none; }
  .sort-chip { padding: 4px 10px; border-radius: 16px; border: 1px solid rgba(0,0,0,.1); font-size: 12px; cursor: pointer; white-space: nowrap; background: var(--bg); color: var(--hint); }
  .sort-chip.active { background: var(--accent); color: #fff; border-color: var(--accent); }

  /* Stats bar */
  .stats-bar { padding: 4px 12px 6px; font-size: 12px; color: var(--hint); }

  /* Cards */
  .cards { padding: 0 12px 80px; }
  .card { background: var(--bg); border: 1px solid rgba(0,0,0,.08); border-radius: var(--r); margin-bottom: 10px; overflow: hidden; box-shadow: 0 1px 4px rgba(0,0,0,.06); transition: transform .1s; }
  .card:active { transform: scale(.99); }
  .card-img { width: 100%; height: 180px; object-fit: cover; background: var(--secondary-bg); display: block; }
  .card-img-placeholder { width: 100%; height: 100px; background: var(--secondary-bg); display: flex; align-items: center; justify-content: center; font-size: 32px; }
  .card-body { padding: 10px 12px 12px; }
  .card-top { display: flex; justify-content: space-between; align-items: flex-start; gap: 8px; }
  .card-price { font-size: 17px; font-weight: 700; color: var(--accent); }
  .card-badge { padding: 3px 8px; border-radius: 20px; font-size: 11px; font-weight: 600; background: #EDF7EE; color: var(--green); }
  .card-title { font-size: 14px; font-weight: 600; margin: 4px 0 2px; }
  .card-loc { font-size: 12px; color: var(--hint); margin-bottom: 6px; }
  .card-params { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 8px; }
  .card-param { font-size: 12px; color: var(--hint); background: var(--secondary-bg); padding: 2px 8px; border-radius: 6px; }
  .card-amenities { font-size: 11px; color: var(--hint); margin-bottom: 8px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .card-actions { display: flex; gap: 8px; }
  .btn-primary { flex: 1; height: 36px; background: var(--btn); color: var(--btn-text); border: none; border-radius: 8px; font-size: 13px; font-weight: 600; cursor: pointer; }
  .btn-outline { height: 36px; padding: 0 14px; background: var(--secondary-bg); color: var(--text); border: 1px solid rgba(0,0,0,.1); border-radius: 8px; font-size: 13px; cursor: pointer; }

  /* Empty state */
  .empty { text-align: center; padding: 40px 20px; color: var(--hint); }
  .empty-icon { font-size: 48px; margin-bottom: 12px; }
  .empty-text { font-size: 15px; margin-bottom: 4px; color: var(--text); font-weight: 600; }
  .empty-sub { font-size: 13px; }

  /* Loading */
  .loading { text-align: center; padding: 40px; color: var(--hint); }
  .spinner { width: 32px; height: 32px; border: 3px solid var(--secondary-bg); border-top-color: var(--btn); border-radius: 50%; animation: spin .8s linear infinite; margin: 0 auto 12px; }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* Bottom sheet */
  .overlay { position: fixed; inset: 0; background: rgba(0,0,0,.5); z-index: 200; opacity: 0; pointer-events: none; transition: opacity .2s; }
  .overlay.show { opacity: 1; pointer-events: all; }
  .sheet { position: fixed; bottom: 0; left: 0; right: 0; background: var(--bg); border-radius: 20px 20px 0 0; z-index: 201; padding: 16px; max-height: 85vh; overflow-y: auto; transform: translateY(100%); transition: transform .25s cubic-bezier(.4,0,.2,1); }
  .sheet.show { transform: translateY(0); }
  .sheet-handle { width: 40px; height: 4px; background: rgba(0,0,0,.15); border-radius: 2px; margin: 0 auto 14px; }
  .sheet-title { font-size: 17px; font-weight: 700; margin-bottom: 12px; }
  .detail-row { display: flex; justify-content: space-between; padding: 8px 0; border-bottom: 1px solid rgba(0,0,0,.06); font-size: 14px; }
  .detail-label { color: var(--hint); }
  .detail-val { font-weight: 500; text-align: right; max-width: 60%; }
  .detail-desc { font-size: 13px; color: var(--hint); line-height: 1.5; margin: 10px 0; }
  .sheet-actions { display: flex; gap: 8px; margin-top: 14px; }
  .sheet-btn { flex: 1; height: 44px; border-radius: 10px; font-size: 15px; font-weight: 600; cursor: pointer; border: none; }
  .sheet-btn.primary { background: var(--btn); color: var(--btn-text); }
  .sheet-btn.outline { background: var(--secondary-bg); color: var(--text); }
</style>
</head>
<body>

<div class="header">
  <div class="header-title">🏙 Аренда квартир Астана</div>
  <div class="search-row">
    <input class="search-input" id="searchInput" type="text" placeholder="Поиск по адресу, району…" oninput="onSearch()">
    <div class="filter-btn" id="filterBtn" onclick="toggleFilters()">⚙️</div>
  </div>
</div>

<div class="filters" id="filtersPanel">
  <div class="filter-label">Комнаты</div>
  <div class="chips" id="roomsChips">
    <div class="chip" data-val="0" onclick="toggleChip(this,'rooms')">Студия</div>
    <div class="chip" data-val="1" onclick="toggleChip(this,'rooms')">1</div>
    <div class="chip" data-val="2" onclick="toggleChip(this,'rooms')">2</div>
    <div class="chip" data-val="3" onclick="toggleChip(this,'rooms')">3</div>
    <div class="chip" data-val="4" onclick="toggleChip(this,'rooms')">4+</div>
  </div>
  <div class="filter-label">Район</div>
  <div class="chips" id="districtChips">
    <div class="chip" data-val="Алматы" onclick="toggleChip(this,'district')">Алматы</div>
    <div class="chip" data-val="Есиль" onclick="toggleChip(this,'district')">Есиль</div>
    <div class="chip" data-val="Байконур" onclick="toggleChip(this,'district')">Байконур</div>
    <div class="chip" data-val="Сарыарка" onclick="toggleChip(this,'district')">Сарыарка</div>
    <div class="chip" data-val="Нура" onclick="toggleChip(this,'district')">Нура</div>
  </div>
  <div class="filter-label">Цена ₸/мес</div>
  <div class="price-row">
    <input class="price-input" id="priceMin" type="number" placeholder="от" oninput="applyFilters()">
    <input class="price-input" id="priceMax" type="number" placeholder="до" oninput="applyFilters()">
  </div>
</div>

<div class="sort-bar">
  <div class="sort-chip active" data-sort="new" onclick="setSort(this)">Новые</div>
  <div class="sort-chip" data-sort="price_asc" onclick="setSort(this)">Цена ↑</div>
  <div class="sort-chip" data-sort="price_desc" onclick="setSort(this)">Цена ↓</div>
  <div class="sort-chip" data-sort="area_desc" onclick="setSort(this)">Площадь ↓</div>
</div>

<div class="stats-bar" id="statsBar">Загрузка…</div>
<div class="cards" id="cardsContainer"><div class="loading"><div class="spinner"></div>Загружаем объявления…</div></div>

<!-- Detail Bottom Sheet -->
<div class="overlay" id="overlay" onclick="closeSheet()"></div>
<div class="sheet" id="detailSheet">
  <div class="sheet-handle"></div>
  <div id="sheetContent"></div>
</div>

<script>
const tg = window.Telegram?.WebApp;
if (tg) { tg.ready(); tg.expand(); }

// ── State ─────────────────────────────────────────────────────────────────────
let allListings = [];
let filtered    = [];
let sortMode    = 'new';
const activeFilters = { rooms: null, district: null, priceMin: null, priceMax: null };
const filterOpen = { value: false };

// ── Fetch listings from bot API ───────────────────────────────────────────────
async function loadListings() {
  try {
    // Получаем данные из URL-параметров (бот передаёт их при открытии)
    const params  = new URLSearchParams(window.location.search);
    const dataUrl = params.get('api') || '/api/listings';
    const resp    = await fetch(dataUrl);
    if (!resp.ok) throw new Error('API error');
    allListings = await resp.json();
  } catch (e) {
    // Demo данные для разработки
    allListings = generateDemoData();
  }
  applyFilters();
}

function generateDemoData() {
  const districts = ['Есиль', 'Алматы', 'Байконур', 'Сарыарка'];
  const addresses = ['ул. Достык 1', 'пр. Туран 12', 'ул. Мәңгілік Ел 3', 'ул. Сыганак 45'];
  return Array.from({length: 24}, (_, i) => ({
    external_id: `LST${String(i+1).padStart(3,'0')}`,
    rooms:       i % 5,
    area:        35 + Math.round(Math.random() * 80),
    floor:       1 + Math.floor(Math.random() * 16),
    total_floors:16,
    price:       80000 + Math.floor(Math.random() * 12) * 20000,
    district:    districts[i % 4],
    address:     addresses[i % 4],
    description: 'Уютная квартира с хорошим ремонтом. Вся необходимая мебель и техника.',
    amenities:   ['Мебель', 'Wi-Fi', 'Кондиционер'].slice(0, 1 + i % 3).join(', '),
    photos:      [],
    landlord_phone: '+7 777 000 00 ' + String(10 + i),
    landlord_username: '@owner_' + i,
    created_at:  new Date(Date.now() - i * 3600000).toISOString(),
    deposit:     i % 2 ? '1 месяц' : 'Нет',
    contract_months: '3-6 месяцев',
  }));
}

// ── Filters ───────────────────────────────────────────────────────────────────
function toggleFilters() {
  const panel = document.getElementById('filtersPanel');
  const btn   = document.getElementById('filterBtn');
  filterOpen.value = !filterOpen.value;
  panel.classList.toggle('open', filterOpen.value);
  btn.classList.toggle('active', filterOpen.value);
}

function toggleChip(el, type) {
  const val = el.dataset.val;
  if (type === 'rooms') {
    document.querySelectorAll('#roomsChips .chip').forEach(c => c.classList.remove('sel'));
    if (activeFilters.rooms == val) { activeFilters.rooms = null; }
    else { activeFilters.rooms = parseInt(val); el.classList.add('sel'); }
  } else if (type === 'district') {
    document.querySelectorAll('#districtChips .chip').forEach(c => c.classList.remove('sel'));
    if (activeFilters.district === val) { activeFilters.district = null; }
    else { activeFilters.district = val; el.classList.add('sel'); }
  }
  applyFilters();
}

function onSearch() { applyFilters(); }

function applyFilters() {
  const q        = document.getElementById('searchInput').value.toLowerCase();
  const priceMin = parseInt(document.getElementById('priceMin').value) || 0;
  const priceMax = parseInt(document.getElementById('priceMax').value) || Infinity;

  filtered = allListings.filter(lst => {
    if (activeFilters.rooms !== null && lst.rooms !== activeFilters.rooms) return false;
    if (activeFilters.district && lst.district !== activeFilters.district) return false;
    if (lst.price < priceMin || lst.price > priceMax) return false;
    if (q && !`${lst.address} ${lst.district} ${lst.description}`.toLowerCase().includes(q)) return false;
    return true;
  });

  sortListings();
  renderCards();
}

// ── Sort ──────────────────────────────────────────────────────────────────────
function setSort(el) {
  document.querySelectorAll('.sort-chip').forEach(c => c.classList.remove('active'));
  el.classList.add('active');
  sortMode = el.dataset.sort;
  sortListings();
  renderCards();
}

function sortListings() {
  filtered.sort((a, b) => {
    if (sortMode === 'price_asc')  return a.price - b.price;
    if (sortMode === 'price_desc') return b.price - a.price;
    if (sortMode === 'area_desc')  return (b.area || 0) - (a.area || 0);
    return new Date(b.created_at) - new Date(a.created_at);
  });
}

// ── Render ────────────────────────────────────────────────────────────────────
function fmtPrice(p) { return p.toLocaleString('ru-RU') + ' ₸/мес'; }
function roomLabel(r) { return r === 0 ? 'Студия' : `${r}-комн.`; }

function renderCards() {
  const container = document.getElementById('cardsContainer');
  document.getElementById('statsBar').textContent =
    `Найдено: ${filtered.length} объявлений из ${allListings.length}`;

  if (!filtered.length) {
    container.innerHTML = `<div class="empty"><div class="empty-icon">🏠</div><div class="empty-text">Ничего не найдено</div><div class="empty-sub">Попробуйте изменить фильтры</div></div>`;
    return;
  }

  container.innerHTML = filtered.map((lst, i) => {
    const rooms = roomLabel(lst.rooms);
    const params = [
      lst.area ? `${lst.area} м²` : null,
      (lst.floor && lst.total_floors) ? `${lst.floor}/${lst.total_floors} эт.` : null,
    ].filter(Boolean).map(p => `<span class="card-param">${p}</span>`).join('');

    const imgHtml = lst.photos?.length
      ? `<img class="card-img" src="${lst.photos[0]}" loading="lazy" onerror="this.style.display='none'">`
      : `<div class="card-img-placeholder">🏠</div>`;

    return `<div class="card" onclick="openDetail(${i})">
      ${imgHtml}
      <div class="card-body">
        <div class="card-top">
          <div class="card-price">${fmtPrice(lst.price)}</div>
          <div class="card-badge">Свободна</div>
        </div>
        <div class="card-title">${rooms} · ${lst.district || 'Астана'}</div>
        <div class="card-loc">📍 ${lst.address || lst.district || '—'}</div>
        <div class="card-params">${params}</div>
        ${lst.amenities ? `<div class="card-amenities">✨ ${lst.amenities}</div>` : ''}
        <div class="card-actions">
          <button class="btn-primary" onclick="event.stopPropagation();bookViewing(${i})">📅 Записаться</button>
          <button class="btn-outline" onclick="event.stopPropagation();contactOwner(${i})">📞</button>
        </div>
      </div>
    </div>`;
  }).join('');
}

// ── Detail Sheet ──────────────────────────────────────────────────────────────
function openDetail(idx) {
  const lst = filtered[idx];
  const rows = [
    ['Тип', roomLabel(lst.rooms)],
    ['Цена', fmtPrice(lst.price)],
    ['Район', lst.district || '—'],
    ['Адрес', lst.address || '—'],
    ['Площадь', lst.area ? `${lst.area} м²` : '—'],
    ['Этаж', (lst.floor && lst.total_floors) ? `${lst.floor} из ${lst.total_floors}` : '—'],
    ['Депозит', lst.deposit || '—'],
    ['Договор', lst.contract_months || '—'],
    ['Удобства', lst.amenities || '—'],
  ].map(([l,v]) => `<div class="detail-row"><span class="detail-label">${l}</span><span class="detail-val">${v}</span></div>`).join('');

  document.getElementById('sheetContent').innerHTML = `
    <div class="sheet-title">🏠 ${roomLabel(lst.rooms)} · ${fmtPrice(lst.price)}</div>
    ${rows}
    ${lst.description ? `<div class="detail-desc">${lst.description}</div>` : ''}
    <div class="sheet-actions">
      <button class="sheet-btn primary" onclick="bookViewing(${idx})">📅 Записаться на просмотр</button>
      <button class="sheet-btn outline" onclick="contactOwner(${idx})">📞 Владелец</button>
    </div>`;

  document.getElementById('overlay').classList.add('show');
  document.getElementById('detailSheet').classList.add('show');
}

function closeSheet() {
  document.getElementById('overlay').classList.remove('show');
  document.getElementById('detailSheet').classList.remove('show');
}

// ── Actions ───────────────────────────────────────────────────────────────────
function bookViewing(idx) {
  closeSheet();
  const lst = filtered[idx];
  if (tg) {
    tg.sendData(JSON.stringify({ action: 'book_viewing', listing_id: lst.external_id }));
  } else {
    alert(`Заявка на просмотр: ${lst.external_id}`);
  }
}

function contactOwner(idx) {
  closeSheet();
  const lst = filtered[idx];
  const url = lst.landlord_username
    ? `https://t.me/${lst.landlord_username.replace('@','')}`
    : `https://t.me/+${lst.landlord_phone?.replace(/\D/g,'')}`;
  if (tg) tg.openTelegramLink ? tg.openTelegramLink(url) : window.open(url);
  else window.open(url);
}

// ── Init ──────────────────────────────────────────────────────────────────────
loadListings();
</script>
</body>
</html>
